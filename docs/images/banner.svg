<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6F00"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFD180" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="40" x2="900" y2="40" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="900" y2="80" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="900" y2="120" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="900" y2="160" stroke="#fff" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="200" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Left document (page A) -->
  <g transform="translate(100, 45)" filter="url(#glow)">
    <rect x="0" y="0" width="60" height="78" rx="4" fill="none" stroke="url(#iconGrad)" stroke-width="2.5"/>
    <line x1="10" y1="18" x2="50" y2="18" stroke="#FFD180" stroke-width="2" opacity="0.7"/>
    <line x1="10" y1="30" x2="45" y2="30" stroke="#FFD180" stroke-width="2" opacity="0.5"/>
    <line x1="10" y1="42" x2="48" y2="42" stroke="#FFD180" stroke-width="2" opacity="0.7"/>
    <line x1="10" y1="54" x2="38" y2="54" stroke="#FFD180" stroke-width="2" opacity="0.5"/>
    <line x1="10" y1="66" x2="42" y2="66" stroke="#FFD180" stroke-width="2" opacity="0.4"/>
    <text x="30" y="-6" text-anchor="middle" fill="#FFD180" font-family="monospace" font-size="11" opacity="0.8">A</text>
  </g>

  <!-- Diff arrows / comparison symbol -->
  <g transform="translate(185, 68)" filter="url(#glow)">
    <path d="M0,16 L22,0 L22,10 L38,10 L38,-10 L22,-10 L22,0" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.0"/>
    <!-- Two-way diff arrows -->
    <line x1="0" y1="8" x2="30" y2="8" stroke="#FFFFFF" stroke-width="2.5" opacity="0.9"/>
    <polygon points="26,2 36,8 26,14" fill="#FFFFFF" opacity="0.9"/>
    <line x1="36" y1="24" x2="6" y2="24" stroke="#FFFFFF" stroke-width="2.5" opacity="0.9"/>
    <polygon points="10,18 0,24 10,30" fill="#FFFFFF" opacity="0.9"/>
    <!-- Delta symbol -->
    <text x="18" y="50" text-anchor="middle" fill="#FFD180" font-family="serif" font-size="20" font-weight="bold" opacity="0.7">&#916;</text>
  </g>

  <!-- Right document (page B) with diff highlights -->
  <g transform="translate(235, 45)" filter="url(#glow)">
    <rect x="0" y="0" width="60" height="78" rx="4" fill="none" stroke="url(#iconGrad)" stroke-width="2.5"/>
    <line x1="10" y1="18" x2="50" y2="18" stroke="#FFD180" stroke-width="2" opacity="0.7"/>
    <rect x="8" y="25" width="40" height="10" rx="2" fill="#FF6F00" opacity="0.35"/>
    <line x1="10" y1="30" x2="45" y2="30" stroke="#FFFFFF" stroke-width="2" opacity="0.9"/>
    <line x1="10" y1="42" x2="48" y2="42" stroke="#FFD180" stroke-width="2" opacity="0.5"/>
    <rect x="8" y="49" width="34" height="10" rx="2" fill="#4CAF50" opacity="0.35"/>
    <line x1="10" y1="54" x2="38" y2="54" stroke="#FFFFFF" stroke-width="2" opacity="0.9"/>
    <line x1="10" y1="66" x2="42" y2="66" stroke="#FFD180" stroke-width="2" opacity="0.4"/>
    <text x="30" y="-6" text-anchor="middle" fill="#FFD180" font-family="monospace" font-size="11" opacity="0.8">B</text>
  </g>

  <!-- Title -->
  <text x="480" y="95" text-anchor="middle" fill="#FFFFFF" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="52" font-weight="700" letter-spacing="-1">
    Wayback-Diff
  </text>

  <!-- Subtitle -->
  <text x="480" y="130" text-anchor="middle" fill="#FFD180" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" font-weight="400" letter-spacing="0.5" opacity="0.9">
    Detect meaningful differences between web pages
  </text>

  <!-- Tag pills -->
  <g transform="translate(335, 148)">
    <rect x="0" y="0" width="68" height="22" rx="11" fill="#FFFFFF" opacity="0.15"/>
    <text x="34" y="15" text-anchor="middle" fill="#FFFFFF" font-family="monospace" font-size="10" opacity="0.85">Wayback</text>
  </g>
  <g transform="translate(415, 148)">
    <rect x="0" y="0" width="60" height="22" rx="11" fill="#FFFFFF" opacity="0.15"/>
    <text x="30" y="15" text-anchor="middle" fill="#FFFFFF" font-family="monospace" font-size="10" opacity="0.85">Visual</text>
  </g>
  <g transform="translate(487, 148)">
    <rect x="0" y="0" width="52" height="22" rx="11" fill="#FFFFFF" opacity="0.15"/>
    <text x="26" y="15" text-anchor="middle" fill="#FFFFFF" font-family="monospace" font-size="10" opacity="0.85">CI/CD</text>
  </g>
  <g transform="translate(551, 148)">
    <rect x="0" y="0" width="72" height="22" rx="11" fill="#FFFFFF" opacity="0.15"/>
    <text x="36" y="15" text-anchor="middle" fill="#FFFFFF" font-family="monospace" font-size="10" opacity="0.85">Markdown</text>
  </g>
</svg>
